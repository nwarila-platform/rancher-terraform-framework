{{- $repository := required "image.repository is required." .Values.image.repository -}}
{{- $digest := required "image.digest is required; set a sha256 digest such as sha256:<64 hex chars>." .Values.image.digest -}}
{{- if not (regexMatch "^sha256:[a-fA-F0-9]{64}$" $digest) -}}
{{- fail "image.digest must be a sha256 digest in the form sha256:<64 hex chars>." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform-workload.fullname" . }}
  labels:
    {{- include "platform-workload.labels" . | nindent 4 }}
spec:
  {{- if not .Values.platform.hpa.enabled }}
  replicas: {{ int .Values.platform.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "platform-workload.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "platform-workload.labels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: {{ default false .Values.platform.escape_hatches.api_access_service_account_token }}
      serviceAccountName: {{ include "platform-workload.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ include "platform-workload.name" . }}
          image: {{ printf "%s@%s" $repository $digest | quote }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ int .Values.containerPort }}
              protocol: TCP
          {{- if .Values.platform.persistent_storage }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.platform.persistent_storage.mount_path | quote }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.platform.vault_secret_references }}
          envFrom:
            {{- range $name, $_ := .Values.platform.vault_secret_references }}
            - secretRef:
                name: {{ printf "%s-%s" (include "platform-workload.fullname" $) $name | trunc 63 | trimSuffix "-" | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.platform.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              {{- if (default false .Values.platform.escape_hatches.net_bind_service) }}
              add:
                - NET_BIND_SERVICE
              {{- end }}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      {{- if .Values.platform.persistent_storage }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "platform-workload.fullname" . }}-data
      {{- end }}
