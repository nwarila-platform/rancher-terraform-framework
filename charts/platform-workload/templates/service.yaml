apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-workload.fullname" . }}
  labels:
    {{- include "platform-workload.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "platform-workload.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ int .Values.service.port }}
      targetPort: http
      protocol: TCP
