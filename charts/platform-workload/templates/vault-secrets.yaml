{{- $root := . -}}
{{- $references := .Values.platform.vault_secret_references | default dict -}}
{{- if $references -}}
{{- range $name, $reference := $references }}
{{- $destinationName := printf "%s-%s" (include "platform-workload.fullname" $root) $name | trunc 63 | trimSuffix "-" -}}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ $destinationName }}
  labels:
    {{- include "platform-workload.labels" $root | nindent 4 }}
spec:
  vaultAuthRef: {{ required "vault.authRef is required when platform.vault_secret_references is non-empty." $root.Values.vault.authRef | quote }}
  {{- with $root.Values.vault.namespace }}
  namespace: {{ . | quote }}
  {{- end }}
  mount: {{ required "vault.mount is required when platform.vault_secret_references is non-empty." $root.Values.vault.mount | quote }}
  type: {{ default "kv-v2" $reference.engine | quote }}
  path: {{ required (printf "platform.vault_secret_references.%s.path is required." $name) $reference.path | quote }}
  {{- if $reference.version }}
  version: {{ int $reference.version }}
  {{- end }}
  refreshAfter: {{ default "1h" $root.Values.vault.refreshAfter | quote }}
  destination:
    create: true
    name: {{ $destinationName | quote }}
    {{- with $reference.templates }}
    transformation:
      excludes:
        - ".*"
      templates:
        {{- range $templateName, $templateText := . }}
        {{ $templateName | quote }}:
          text: |-
{{ $templateText | indent 12 }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
