repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 13a6bda8ea7612b3aec844ded16569d424b9a1ab # v0.13.0
    hooks:
      - id: ruff-check
        name: ruff
        args: [tools/]
        pass_filenames: false
        files: ^tools/.*\.py$

  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6 # v1.35.1
    hooks:
      - id: yamllint
        args:
          - -d
          - "{ extends: relaxed, rules: { line-length: disable, document-start: disable, comments: disable, truthy: {check-keys: false} } }"
          - .github/workflows/
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d # v0.11.0
    hooks:
      - id: shellcheck
        files: ^tools/(install_ci_tools|ci/.*)\.sh$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda # v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["**/*.md"]
        pass_filenames: false
        files: \.md$

  - repo: local
    hooks:
      - id: terraform-fmt
        name: terraform fmt
        entry: terraform -chdir=terraform fmt -recursive
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform-docs
        name: terraform-docs
        entry: terraform-docs --config .terraform-docs.yml terraform
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: docs-layout
        name: docs layout
        entry: python tools/check_docs_layout.py
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$|^tools/check_docs_layout.py$

      - id: adr-schema
        name: ADR schema and index
        entry: python tools/check_adr_schema.py
        language: system
        pass_filenames: false
        files: ^docs/decision-records/.*\.md$|^tools/check_adr_schema.py$

      - id: baseline-manifest
        name: baseline manifest
        entry: python tools/check_baseline_manifest.py
        language: system
        pass_filenames: false
        files: ^baseline-manifest\.json$|^tools/check_baseline_manifest\.py$
