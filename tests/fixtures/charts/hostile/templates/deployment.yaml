# DELIBERATELY NON-COMPLIANT FIXTURE — for negative policy testing only; never deploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostile-fixture
  labels:
    app.kubernetes.io/name: hostile-fixture
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
spec:
  replicas: {{ int .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hostile-fixture
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hostile-fixture
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
    spec:
      hostNetwork: true
      hostPID: true
      hostIPC: true
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      containers:
        - name: app
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: host-root
              mountPath: /host
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SYS_ADMIN
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
