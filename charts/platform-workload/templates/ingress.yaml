apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "platform-workload.fullname" . }}
  labels:
    {{- include "platform-workload.labels" . | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.platform.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.platform.ingress.path | quote }}
            pathType: {{ default "Prefix" .Values.ingress.pathType | quote }}
            backend:
              service:
                name: {{ include "platform-workload.fullname" . }}
                port:
                  number: {{ int .Values.service.port }}
