formatter: markdown table

content: |-
  {{ .Header }}

  ## Module Documentation

  Auto-generated by `terraform-docs` from the tenant deploy module in
  [`terraform/modules/deploy/`](../../terraform/modules/deploy/).
  Run `make docs` to regenerate; CI fails if this file is out of sync via
  `make docs-diff`.

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}

output:
  file: "../../../docs/reference/terraform-deploy.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true
