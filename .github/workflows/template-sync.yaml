name: Template Sync

# Detects drift between this consumer and the canonical
# NWarila/terraform-framework-template baseline manifest.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: template-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    if: github.repository != 'NWarila/terraform-framework-template'
    name: framework-template / verify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read # required for checkout and drift-gate source reads
      checks: write # required for drift-gate to publish inline PR annotations
    steps:
      - name: Check out consumer
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Drift gate (framework-template baseline)
        # renovate: datasource=git-refs depName=NWarila/drift-gate
        uses: NWarila/drift-gate@3864401ce520ecb851311efb4ba1a199808768fb # NWarila/drift-gate main @ 2026-06-11
        with:
          source-repo: NWarila/terraform-framework-template
          # renovate: depName=NWarila/terraform-framework-template packageName=NWarila/terraform-framework-template currentValue=main
          source-ref: 799c8e5c05e0a106c4a4f0cd5368e19d34f1c506 # NWarila/terraform-framework-template main @ 2026-06-11
          manifest: baseline-manifest.json
          check-name: framework-template / verify

      - name: Scaffold starter target audit
        env:
          SOURCE_REPO: https://github.com/NWarila/terraform-framework-template.git
          SOURCE_REF: 799c8e5c05e0a106c4a4f0cd5368e19d34f1c506
        run: |
          set -euo pipefail

          git remote add template-source "${SOURCE_REPO}"
          git fetch --depth=1 template-source "${SOURCE_REF}"

          python3 <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          source_ref = os.environ["SOURCE_REF"]
          source_manifest = json.loads(
              subprocess.check_output(
                  ["git", "show", f"{source_ref}:baseline-manifest.json"],
                  text=True,
              )
          )
          manifests = [source_manifest]

          local_manifest = pathlib.Path("baseline-manifest.json")
          if local_manifest.is_file():
              manifests.append(json.loads(local_manifest.read_text()))

          missing = []
          scaffold_targets = sorted(
              {
                  item["target"]
                  for manifest in manifests
                  for item in manifest.get("scaffold_starter", [])
              }
          )
          for target in scaffold_targets:
              if not pathlib.Path(target).is_file():
                  print(f"::error file={target}::missing scaffold starter target")
                  missing.append(target)

          if missing:
              sys.exit(1)

          print(f"scaffold starter existence audit passed: {len(scaffold_targets)} files")
          PY

      - name: Framework local harness audit
        run: |
          python3 <<'PY'
          import pathlib
          import re
          import sys

          checks = [
              (
                  ".github/workflows/ci.yaml",
                  [r"tools/verify\.py\s+(ci|verify)\b"],
                  "framework CI must invoke tools/verify.py ci or verify",
              ),
              (
                  "tools/verify.py",
                  [
                      r'"opa-policy"',
                      r'"privileged-workflows"',
                      r"tools/build_opa_input\.py",
                      r"tools/check_privileged_workflows\.py",
                  ],
                  "tools/verify.py must retain OPA and privileged-workflow gates",
              ),
          ]

          failures = []
          for file_name, patterns, message in checks:
              path = pathlib.Path(file_name)
              if not path.is_file():
                  print(f"::error file={file_name}::missing framework harness file")
                  failures.append(file_name)
                  continue
              text = path.read_text(encoding="utf-8")
              for pattern in patterns:
                  if not re.search(pattern, text):
                      print(f"::error file={file_name}::{message}; missing pattern {pattern}")
                      failures.append(f"{file_name}:{pattern}")

          if failures:
              sys.exit(1)

          print("framework local harness audit passed")
          PY
