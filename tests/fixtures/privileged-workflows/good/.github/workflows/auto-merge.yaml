name: Good Auto-Merge

# Fixture: pull_request_target with no checkout, no PR-content references.
# tools/check_privileged_workflows.py must accept this.

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Decide trust
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: echo "PR author is ${PR_AUTHOR}"
