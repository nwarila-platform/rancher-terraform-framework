name: Drift Gate

# Verifies that this consumer's mirrored copies of upstream baseline
# files are byte-identical to their canonical sources at SHA-pinned
# revisions. Per nwarila-platform/.github ADR-0001 (three-tier ADR
# model) this framework-example is a child repo of the org canonical
# and must mirror its baseline files, including community-health
# policy docs. Failure surfaces inline as annotations in the PR's
# "Files changed" view.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: drift-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  org-baseline:
    name: org-baseline / verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # required for the drift-gate action to read this repository's manifest
      checks: write # required for drift-gate to publish inline PR annotations
    steps:
      - name: Drift gate (org baseline)
        # renovate: datasource=git-refs depName=NWarila/drift-gate
        uses: NWarila/drift-gate@3864401ce520ecb851311efb4ba1a199808768fb # NWarila/drift-gate main @ 2026-06-11
        with:
          source-repo: nwarila-platform/.github
          # renovate: depName=nwarila-platform/.github packageName=nwarila-platform/.github currentValue=main
          source-ref: 0d2a0752d4c618907d735af4a7c12a9214c8517e
          manifest: baseline-manifest.json
          check-name: org-baseline / verify
