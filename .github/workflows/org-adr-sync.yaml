name: Org ADR Sync

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: org-adr-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: org-adr / verify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read # required for the drift-gate action to read this repository's manifest
      checks: write # required for drift-gate to publish inline PR annotations
    steps:
      - name: Drift gate (org ADR baseline)
        # renovate: datasource=git-refs depName=NWarila/drift-gate
        uses: NWarila/drift-gate@3864401ce520ecb851311efb4ba1a199808768fb # NWarila/drift-gate main @ 2026-06-11
        with:
          source-repo: nwarila-platform/.github
          # renovate: depName=nwarila-platform/.github packageName=nwarila-platform/.github
          source-ref: 0d2a0752d4c618907d735af4a7c12a9214c8517e
          manifest: org-adr-manifest.json
          check-name: org-adr / verify
