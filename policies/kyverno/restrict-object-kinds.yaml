apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: nwarila-restrict-object-kinds
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: restrict-workload-object-kinds
      match:
        any:
          - resources:
              kinds:
                - "*"
      exclude:
        any:
          - resources:
              kinds:
                - ConfigMap
                - Deployment
                - HorizontalPodAutoscaler
                - Ingress
                - PersistentVolumeClaim
                - PodDisruptionBudget
                - Service
                - ServiceAccount
                - VaultStaticSecret
      validate:
        failureAction: Enforce
        message: >-
          Tenant charts may render only approved workload kinds: ConfigMap,
          Deployment, HorizontalPodAutoscaler, Ingress, PersistentVolumeClaim,
          PodDisruptionBudget, Service, ServiceAccount, and VaultStaticSecret.
          Secret, Role, RoleBinding, ClusterRole, ClusterRoleBinding,
          CustomResourceDefinition, Namespace, ResourceQuota, LimitRange, and
          NetworkPolicy are denied; use platform-owned controllers or
          VaultStaticSecret where required.
        deny:
          conditions:
            all:
              - key: true
                operator: Equals
                value: true
