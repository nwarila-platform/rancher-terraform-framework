name: CI

# Self-validation for this Terraform framework consumer. When the local
# Terraform module is present it runs the full framework gate; while the module
# is intentionally absent it still exercises the shared scaffold, policy, and
# workflow harness.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read # required for checkout across all CI jobs unless overridden

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  workflow-helper-tests:
    name: workflow helper tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: ShellCheck workflow helpers
        run: shellcheck tools/install_ci_tools.sh tools/ci/*.sh
      - name: Check workflow run-block input binding
        run: python tools/ci/check_workflow_run_inputs.py .github/workflows
      - name: Bats workflow helper tests
        run: bats tests/ci/*.bats

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**/*.md"

  mypy-advisory:
    name: mypy (advisory)
    # Type-check `tools/` to surface real regressions in static typing.
    # Advisory only — does not block merges. Use `::warning::` annotations
    # so findings are visible in PR review without failing the job.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install --no-cache-dir mypy==1.13.0 types-PyYAML==6.0.12.20240917
      - name: Run mypy (advisory)
        run: |
          python -m mypy --ignore-missing-imports tools/ \
            || echo "::warning::Mypy advisory reported findings (does not block merge)"

  ruff-sarif:
    name: ruff (SARIF → Security tab)
    # Runs ruff with --output-format sarif so Python static-analysis findings
    # flow into the consumer's GitHub Security tab alongside CodeQL, Trivy,
    # Gitleaks, zizmor, and Scorecard. continue-on-error keeps Security-tab
    # publishing advisory; existing verify.py lint gate remains the hard
    # block.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # required for checkout before generating the SARIF report
      security-events: write # required to upload advisory Ruff SARIF to code scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --no-cache-dir ruff==0.13.0
      - name: Run ruff with SARIF output
        continue-on-error: true
        run: ruff check --output-format sarif --output-file ruff.sarif tools/
      - name: Upload ruff SARIF
        if: always() && hashFiles('ruff.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ruff.sarif

  tflint-sarif:
    name: tflint (SARIF → Security tab)
    # Runs tflint with --format=sarif so Terraform static-analysis findings
    # flow into the GitHub Security tab. continue-on-error keeps Security-tab
    # publishing advisory; verify.py's `tflint` step in the terraform-ci job
    # below remains the hard block.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # required for checkout before generating the SARIF report
      security-events: write # required to upload advisory TFLint SARIF to code scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Detect Terraform module
        id: terraform-module
        run: |
          if [ -d terraform ] && find terraform -name '*.tf' -type f | grep -q .; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Install pinned CI tools
        if: steps.terraform-module.outputs.present == 'true'
        env:
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: "1.7.12"
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION: "0.8.0"
          # renovate: datasource=github-releases depName=kyverno/kyverno
          KYVERNO_VERSION: "1.18.1"
          # renovate: datasource=npm depName=markdownlint-cli2
          MARKDOWNLINT_CLI2_VERSION: "0.22.1"
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          TFLINT_VERSION: "0.63.1"
          # renovate: datasource=github-releases depName=terraform-docs/terraform-docs
          TERRAFORM_DOCS_VERSION: "0.24.0"
          # renovate: datasource=github-releases depName=open-policy-agent/opa
          OPA_VERSION: "1.10.0"
        run: bash tools/install_ci_tools.sh
      - name: tflint init
        if: steps.terraform-module.outputs.present == 'true'
        run: tflint --init --config .tflint.hcl
      - name: Run tflint with SARIF output
        if: steps.terraform-module.outputs.present == 'true'
        continue-on-error: true
        run: tflint --config .tflint.hcl --chdir terraform --format=sarif > tflint.sarif
      - name: Upload tflint SARIF
        if: always() && hashFiles('tflint.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: tflint.sarif

  terraform-ci:
    name: framework verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Terraform
        # renovate: datasource=github-releases depName=hashicorp/terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false

      - name: Install pinned CI tools
        env:
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: "1.7.12"
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION: "0.8.0"
          # renovate: datasource=github-releases depName=kyverno/kyverno
          KYVERNO_VERSION: "1.18.1"
          # renovate: datasource=npm depName=markdownlint-cli2
          MARKDOWNLINT_CLI2_VERSION: "0.22.1"
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          TFLINT_VERSION: "0.63.1"
          # renovate: datasource=github-releases depName=terraform-docs/terraform-docs
          TERRAFORM_DOCS_VERSION: "0.24.0"
          # renovate: datasource=github-releases depName=open-policy-agent/opa
          OPA_VERSION: "1.10.0"
        run: bash tools/install_ci_tools.sh

      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: Verify
        run: |
          set -euo pipefail

          if [ -d terraform ] && find terraform -name '*.tf' -type f | grep -q .; then
            python tools/verify.py verify
          else
            python tools/verify.py workflow-bom-check
            python tools/verify.py workflow-helper-tests
            python tools/verify.py privileged-workflows
            python tools/verify.py opa-test
            python tools/verify.py opa-policy
            python tools/verify.py manifest-check
            python tools/verify.py docs-layout
            python tools/verify.py adr-schema
          fi

      - name: Upload terraform test junit XML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-test-junit
          path: artifacts/terraform-test.xml
          if-no-files-found: warn
          retention-days: 14
