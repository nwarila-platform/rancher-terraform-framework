name: Org ADR Auto Sync

on:
  schedule:
    - cron: "3 7 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: org-adr-auto-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: org ADR auto-sync
    permissions:
      contents: read # required for the reusable sync workflow to compare mirrored ADR files
      pull-requests: read # required to detect an existing sync PR before creating another
    uses: nwarila-platform/.github/.github/workflows/reusable-org-adr-auto-sync.yaml@0d2a0752d4c618907d735af4a7c12a9214c8517e # nwarila-platform/.github main @ 2026-06-11
    with:
      source_repo: nwarila-platform/.github
      source_ref: main
      branch_name: sync/org-adrs
      pr_title: "[sync] refresh org ADR mirrors"
    secrets:
      sync_token: ${{ secrets.ORG_ADR_SYNC_TOKEN }}
