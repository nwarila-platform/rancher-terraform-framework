{{- if .Values.platform.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "platform-workload.fullname" . }}
  labels:
    {{- include "platform-workload.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "platform-workload.fullname" . }}
  minReplicas: {{ int .Values.platform.hpa.min_replicas }}
  maxReplicas: {{ int .Values.platform.hpa.max_replicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ int .Values.platform.hpa.target_cpu_utilization_percentage }}
{{- end }}
